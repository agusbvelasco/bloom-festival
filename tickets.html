<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Festival</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

  <!-- Nav -->
  <nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="./index.html">
      <img  src="./assets/logo-sm-inverse.svg" alt="Bloom Festival logo">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span>
        <img class="icon-menu" src="./assets/menu-icon.svg" alt="Menu">
      </span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link" href="./artists.html">Artists</a>
        <a class="nav-link" href="./agenda.html">Agenda</a>
        <a class="nav-link" href="./info.html">Info</a>
      </div>
    </div>
  </div>
  <a class="navbar-button btn btn-primary" href="./tickets.html">Get Tickets</a>
</nav>

<!-- Main -->
<main>
    <section class="tickets-section">
        <div class="container-fluid">
            <h1 class="text-center">Get Your Tickets</h1>

            <form class="tickets-form">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter Full Name">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter Email Address">
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label for="ticketType" class="form-label">Ticket Type</label>
                        <select class="form-select" id="ticketType">
                            <option selected disabled>Select Ticket Type</option>
                            <option value="general">General</option>
                            <option value="Vip">VIP</option>
                        </select>
                    </div>
                    <div class="col-6 mb-3">
                        <label for="quantity" class="form-label">Quantity</label>
                        <select class="form-select" id="quantity">
                            <option selected disabled>Select Quantity</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                <label class="form-label">Payment Method</label>
                <div class="row">
                    <div class="col-6">
                        <button type="button" class="payment-option w-100">Credit Card</button>
                    </div>
                    <div class="col-6">
                        <button type="button" class="payment-option w-100">PayPal</button>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary">Complete Purchase</button>
            </div>
            </form>
        </div>
    </section>
</main>

<!-- Footer -->

<footer class="footer">
    <div class="container-fluid">
      <img class="footer-logo" src="./assets/logo-lg.svg" alt="Bloom Festival Logo">
      <div class="footer-content">
        <div class="social-icons">
          <img src="./assets/icon-instagram.svg" alt="Instagram">
          <img src="/assets/icon-tiktok.svg" alt="Tik Tok">
          <img src="./assets/icon-youtube.svg" alt="Youtube">
        </div>
        <p>ALL RIGHTS RESERVED ©2026</p>
      </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>    
</html>
